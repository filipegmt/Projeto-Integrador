services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n_ai_reservas
    restart: always
    ports:
      - "5678:5678"
    dns:
      - 8.8.8.8
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
    volumes:
      - ./n8n-data:/home/node/.n8n
      - .:/home/node/projeto
